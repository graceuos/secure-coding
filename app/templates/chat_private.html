{% extends 'base.html' %}
{% block content %}
<h2>[{{ product.title }}] {{ other.username }}님과의 채팅</h2>
<a href="{{ url_for('products.product_detail', product_id=product.id) }}">상품으로 돌아가기</a>

<div id="messages" style="border:1px solid #ccc; height:300px; overflow-y:scroll; padding:8px;">
{% for m in history %}
    <p><b>{{ m.sender.username }}</b> ({{ m.created_at.strftime('%H:%M') }}): {{ m.content }}</p>
{% endfor %}
</div>

<input type="text" id="msg_input" maxlength="500" placeholder="메시지 입력">
<button id="send_btn">전송</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script>
    const socket = io();
    const room = "{{ room }}";
    const receiverId = {{ other.id }};
    const productId = {{ product.id }};
    const messagesDiv = document.getElementById('messages');

    socket.on('connect', function() {
        socket.emit('join', {room: room});
    });

    socket.on('receive_private_message', function(data) {
        const p = document.createElement('p');
        const b = document.createElement('b');
        b.textContent = data.sender;
        p.appendChild(b);
        p.appendChild(document.createTextNode(' (' + data.time + '): '));
        const span = document.createElement('span');
        span.textContent = data.content;
        p.appendChild(span);
        messagesDiv.appendChild(p);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    document.getElementById('send_btn').onclick = function() {
        const input = document.getElementById('msg_input');
        const content = input.value.trim();
        if (!content) return;
        socket.emit('send_private_message', {content: content, receiver_id: receiverId, product_id: productId});
        input.value = '';
    };
</script>
{% endblock %}
