{% extends 'base.html' %}{% block content %}<h2>내 상품 관리</h2>
<ul>{% for item in items %}
<li>{{ item.title }} - {{ item.price }}원 [{{ '차단됨' if item.is_blocked else '정상' }}]
 <a href="{{ url_for('users.product_edit', product_id=item.id) }}">수정</a>
 <a href="{{ url_for('products.product_detail', product_id=item.id) }}">보기</a>
</li>
{% endfor %}</ul>
<a href="{{ url_for('products.product_list') }}">목록으로</a>{% endblock %}
